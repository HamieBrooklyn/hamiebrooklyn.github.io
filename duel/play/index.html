<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <title>Duel Arena — Poké Pon</title>
  <meta name="pokepon-api-base" content="https://api.pokepon.org" />
  <script src="/assets/staging-env.js?v=1"></script>
  <script>
    (function () {
      var SESSION_KEY = "pokepon-session";
      var API_KEY = "pokepon-api-base";

      function captureSession() {
        if (!window.location.hash) return;
        var p = new URLSearchParams(window.location.hash.slice(1));
        var t = p.get("session");
        if (!t) return;
        try { localStorage.setItem(SESSION_KEY, t); } catch (_) {}
        p.delete("session");
        var h = p.toString();
        window.history.replaceState(
          null,
          "",
          window.location.pathname + window.location.search + (h ? "#" + h : "")
        );
      }

      captureSession();

      var params = new URLSearchParams(window.location.search);
      var override = params.get("api");
      if (override === "clear" || override === "reset") {
        try { localStorage.removeItem(API_KEY); } catch (_) {}
      } else if (override && /^https?:\/\//i.test(override)) {
        try { localStorage.setItem(API_KEY, override.replace(/\/+$/, "")); } catch (_) {}
      }

      var stored = "";
      try { stored = localStorage.getItem(API_KEY) || ""; } catch (_) {}
      var meta = document.querySelector('meta[name="pokepon-api-base"]');
      var fromMeta = (meta && meta.content) ? meta.content.trim() : "";
      var base = (stored || fromMeta || "").replace(/\/+$/, "");
      window.POKEPON_API_BASE = base;

      if (!params.get("api") && stored && /^https?:\/\//i.test(stored)) {
        params.set("api", stored.replace(/\/+$/, ""));
        window.location.replace(
          window.location.pathname + "?" + params.toString() + window.location.hash
        );
        return;
      }

      var back = null;
      document.addEventListener("DOMContentLoaded", function () {
        back = document.getElementById("duel-play-back");
        if (back) {
          var api = params.get("api") || stored;
          if (api) back.href = "/duel/?api=" + encodeURIComponent(api.replace(/\/+$/, ""));
        }
      });

      function authHeaders() {
        var h = { "ngrok-skip-browser-warning": "1" };
        try {
          var tok = localStorage.getItem(SESSION_KEY) || "";
          if (tok) h.Authorization = "Bearer " + tok;
        } catch (_) {}
        return h;
      }

      function startGame() {
        var s = document.createElement("script");
        s.type = "module";
        s.crossOrigin = "anonymous";
        s.src = "/duel/play/game/assets/index.js?v=2";
        document.body.appendChild(s);
      }

      function showAuthError(msg) {
        var el = document.getElementById("duel-play-status");
        if (el) el.textContent = msg;
      }

      if (!base) {
        document.addEventListener("DOMContentLoaded", function () {
          showAuthError("API not configured. Open from /duel/ with ?api= or sign in on the lobby first.");
        });
        return;
      }

      fetch(base + "/api/me", { credentials: "include", headers: authHeaders() })
        .then(function (r) { return r.json().then(function (body) { return { ok: r.ok, body: body }; }); })
        .then(function (res) {
          if (res.body && res.body.authenticated && res.body.user) {
            startGame();
            return;
          }
          captureSession();
          return fetch(base + "/api/me", { credentials: "include", headers: authHeaders() })
            .then(function (r2) { return r2.json(); })
            .then(function (body2) {
              if (body2 && body2.authenticated && body2.user) {
                startGame();
                return;
              }
              window.location.href =
                base + "/auth/discord/login?return_to=" + encodeURIComponent(window.location.href);
            });
        })
        .catch(function () {
          showAuthError("Could not reach API at " + base + ". Is the staging bot running?");
        });
    })();
  </script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0c0e12; overflow: hidden; }
    #game-root { width: 100%; height: 100%; }
    #duel-play-status {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 90%;
      font: 16px system-ui, sans-serif;
      color: #9aa0a6;
      text-align: center;
      padding: 1rem;
    }
    .duel-play-back {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      font: 600 13px system-ui, sans-serif;
      color: #9aa0a6;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(30, 36, 48, 0.85);
    }
    .duel-play-back:hover { color: #fff; }
  </style>
</head>
<body>
  <a class="duel-play-back" id="duel-play-back" href="/duel/">← Lobby</a>
  <p id="duel-play-status">Loading duel arena…</p>
  <div id="game-root"></div>
</body>
</html>
