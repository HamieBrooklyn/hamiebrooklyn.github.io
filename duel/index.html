<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="apple-touch-icon" href="/assets/favicon.png" />
  <title>Duels — Poké Pon</title>
  <meta name="description" content="Challenge other players to advanced PvP duels on Poké Pon." />
  <link rel="canonical" href="https://pokepon.org/duel/" />
  <link rel="stylesheet" href="/assets/style.css?v=41" />
  <link rel="stylesheet" href="/assets/duel.css?v=3" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <meta name="pokepon-api-base" content="https://api.pokepon.org" />
</head>
<body class="app-body">
  <div class="bg-grid"></div>

  <div class="app-shell" id="app">
    <aside class="sidebar" id="sidebar" aria-label="Primary">
      <div class="sidebar-top">
        <a class="logo sidebar-logo" href="/">Poké Pon</a>
        <button class="sidebar-toggle" type="button" id="sidebar-toggle" aria-controls="sidebar" aria-expanded="false">
          <span class="sidebar-toggle-bar"></span>
          <span class="sidebar-toggle-bar"></span>
          <span class="sidebar-toggle-bar"></span>
        </button>
      </div>

      <nav class="sidebar-nav" aria-label="Sections"></nav>

      <div class="sidebar-user" id="sidebar-user" data-state="loading">
        <div class="sidebar-user-loading">Checking session…</div>
        <div class="sidebar-user-signedout" hidden>
          <p>Sign in with Discord to duel.</p>
          <button class="btn btn-primary btn-block" id="btn-login" type="button">Sign in</button>
        </div>
        <div class="sidebar-user-signedin" hidden>
          <div class="sidebar-user-row">
            <img class="sidebar-user-avatar" id="user-avatar" alt="" />
            <div class="sidebar-user-meta">
              <div class="sidebar-user-name" id="user-name"></div>
              <div class="sidebar-user-id" id="user-id"></div>
            </div>
          </div>
          <div class="sidebar-user-row sidebar-user-balances" id="sidebar-user-balances" hidden>
            <div class="sidebar-user-balance">
              <span class="sidebar-user-balance-label">Pokedollars</span>
              <span class="sidebar-user-balance-value" id="balance-pd">—</span>
            </div>
            <div class="sidebar-user-balance">
              <span class="sidebar-user-balance-label">Crystals</span>
              <span class="sidebar-user-balance-value" id="balance-cr">—</span>
            </div>
          </div>
          <button class="btn btn-ghost btn-block" id="btn-logout" type="button">Sign out</button>
        </div>
      </div>
    </aside>

    <main class="app-main" aria-label="Duels">
      <header class="page-head">
        <div>
          <h1 class="page-title">Duels</h1>
          <p class="page-subtitle">Challenge someone to an advanced PvP duel.</p>
        </div>
      </header>

      <section class="duel-invite" id="duel-invite-section" hidden>
        <h2 class="h2">Invite</h2>
        <div class="duel-invite-form">
          <div class="duel-field duel-field-invite">
            <label class="label" for="invite-input">Opponent</label>
            <input class="input" id="invite-input" autocomplete="off" placeholder="Search username…" />
            <div id="invite-suggestions" class="invite-suggestions" role="listbox" aria-label="Matching users" hidden></div>
          </div>
          <div class="duel-field">
            <label class="label" for="bet-currency">Bet currency</label>
            <select class="input" id="bet-currency">
              <option value="pokedollars">Pokedollars</option>
              <option value="crystals">Crystals</option>
            </select>
          </div>
          <div class="duel-field">
            <label class="label" for="bet-amount">Bet amount</label>
            <input class="input" id="bet-amount" inputmode="numeric" placeholder="0" />
          </div>
          <div class="duel-field duel-field-actions">
            <button class="btn btn-primary" type="button" id="btn-invite">Send duel invite</button>
            <div class="duel-msg" id="invite-msg" aria-live="polite"></div>
          </div>
        </div>
      </section>

      <section class="duel-list" id="duel-list-section" hidden>
        <h2 class="h2">Your duels</h2>
        <div class="duel-list-error" id="duel-list-error" hidden></div>
        <div class="duel-list-empty" id="duel-list-empty" hidden>No active duels yet.</div>
        <div class="duel-list-items" id="duel-list"></div>
      </section>

      <section class="duel-room" id="duel-room" hidden>
        <div class="duel-room-head">
          <div>
            <h2 class="h2" id="duel-room-title">Duel</h2>
            <div class="duel-room-meta" id="duel-room-meta"></div>
          </div>
          <div class="duel-room-actions">
            <button class="btn btn-ghost" type="button" id="btn-leave">Leave</button>
            <button class="btn btn-danger" type="button" id="btn-surrender">Surrender</button>
          </div>
        </div>

        <div class="duel-ground">
          <div class="duel-deck duel-deck-opponent">
            <div class="duel-deck-title">Opponent deck</div>
            <div class="duel-deck-cards" id="opponent-deck"></div>
          </div>

          <div class="duel-center">
            <div class="duel-stacks">
              <button class="duel-stack" type="button" id="draw-energy">Energy stack</button>
              <button class="duel-stack" type="button" id="draw-item">Item stack</button>
              <div class="duel-draw-hint" id="draw-hint"></div>
            </div>

            <div class="duel-items">
              <div class="duel-items-title">Your items</div>
              <div class="duel-items-hand" id="items-hand"></div>
            </div>
          </div>

          <div class="duel-deck duel-deck-you">
            <div class="duel-deck-title">Your deck</div>
            <div class="duel-deck-cards" id="your-deck"></div>
          </div>

          <aside class="duel-side">
            <div class="duel-coin" id="duel-coin">
              <div class="duel-coin-face" id="coin-face">?</div>
            </div>
            <div class="duel-stakes" id="duel-stakes"></div>
            <button class="btn btn-small btn-primary" type="button" id="btn-end-turn">End turn</button>
          </aside>
        </div>

        <div class="duel-log" id="duel-log"></div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      var meta = document.querySelector('meta[name="pokepon-api-base"]');
      var base = meta ? meta.getAttribute("content") : "";
      try {
        var p = new URLSearchParams(window.location.search);
        var api = p.get("api");
        if (api) {
          api = api.replace(/\/+$/, "");
          localStorage.setItem("pokepon-api-base", api);
        }
        base = localStorage.getItem("pokepon-api-base") || base;
      } catch (_) {}
      window.POKEPON_API_BASE = (base || "").replace(/\/+$/, "");
    })();
  </script>
  <script src="/assets/app-shell.js" defer></script>
  <script src="/assets/duel.js?v=3" defer></script>
</body>
</html>
